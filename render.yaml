services:
  - type: web
    name: sitenet-api
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma migrate deploy && npx prisma db seed && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

databases:
  - name: sitenet-db
    plan: free
